<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FloodWatch AI — Real-Time Satellite Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg: #07090f;
  --surface: #0c1220;
  --surface2: #101928;
  --border: #1a2840;
  --accent: #0ea5e9;
  --accent2: #38bdf8;
  --warn: #f59e0b;
  --danger: #ef4444;
  --safe: #22c55e;
  --text: #e8edf5;
  --muted: #5a7090;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); overflow: hidden; font-size: 15px; }

#map {
  position: fixed; top: 0; left: 0;
  height: 100vh; width: 100vw;
}
/* Clean normal-looking blue map — no heavy filters */
.leaflet-tile-pane { filter: brightness(0.96) saturate(1.05); }
.leaflet-control-zoom { display: none !important; }

/* ── HUD ── */
.hud { position: fixed; z-index: 1000; }

#hud-top {
  top: 0; left: 0; right: 0;
  background: linear-gradient(to bottom, rgba(7,9,15,0.97) 0%, transparent 100%);
  padding: 14px 24px 28px;
  display: flex; align-items: center; gap: 18px;
  pointer-events: none;
}
.logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent2); font-family: var(--mono); white-space: nowrap; }
.logo span { color: var(--muted); font-weight: 400; }
.status-ticker { flex: 1; font-family: var(--mono); font-size: 11px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--safe); margin-right: 8px; animation: pulse 2s ease-in-out infinite; vertical-align: middle; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.75)} }

/* ── Bottom-right zoom cluster ── */
#controls-br {
  bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
  z-index: 1200;
}
.zoom-group {
  background: rgba(7,9,15,0.96);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.zoom-btn {
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px;
  background: transparent; border: none; cursor: pointer;
  color: var(--text); font-size: 22px; font-weight: 300; transition: all 0.15s;
}
.zoom-btn:hover { background: rgba(14,165,233,0.15); color: var(--accent2); }
.zoom-divider { height: 1px; background: var(--border); margin: 0 8px; }
.fit-btn {
  background: rgba(7,9,15,0.96); border: 1px solid var(--border); border-radius: 12px;
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--muted); transition: all 0.15s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.fit-btn:hover { color: var(--accent2); border-color: var(--accent); background: rgba(14,165,233,0.1); }

/* ── Legend (bottom-left) ── */
#hud-legend { bottom: 24px; left: 24px; z-index: 1200; }
.legend-card {
  background: rgba(7,9,15,0.95); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 20px;
  backdrop-filter: blur(16px); box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.legend-title { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--muted); margin-bottom: 12px; }
.legend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.legend-text { font-size: 14px; color: #94a3b8; font-weight: 500; }
.legend-score { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: auto; padding-left: 14px; }

/* ── Click Hint ── */
#click-hint {
  bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(7,9,15,0.94); border: 1px solid var(--border);
  border-radius: 32px; padding: 11px 22px; font-size: 13px; color: var(--muted);
  white-space: nowrap; backdrop-filter: blur(16px); pointer-events: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

/* ══════════════════════════════════════════
   CITY MARKER — Orange pushpin button style
   ══════════════════════════════════════════ */
.city-marker-wrap {
  position: relative;
  cursor: pointer;
  /* Leaflet will position this; we offset so pin tip is at lat/lng */
  transform: translate(-50%, -100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: max-content;
  pointer-events: all;
}

.city-pin-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #ea6c0a;
  border: none;
  border-radius: 22px;
  padding: 6px 13px 6px 9px;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.2px;
  box-shadow: 0 3px 14px rgba(234,108,10,0.55), 0 1px 4px rgba(0,0,0,0.4);
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  white-space: nowrap;
  line-height: 1;
  border: 2px solid rgba(255,255,255,0.25);
  position: relative;
  z-index: 2;
}
.city-pin-btn .pin-icon {
  font-size: 15px;
  line-height: 1;
  flex-shrink: 0;
}
.city-pin-btn .pin-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1px;
}

/* Tiny triangle tip below the button */
.city-pin-tip {
  width: 0; height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-top: 10px solid #ea6c0a;
  margin-top: -1px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 3px 4px rgba(234,108,10,0.4));
}

.city-marker-wrap:hover .city-pin-btn {
  background: #ff7a12;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(234,108,10,0.7), 0 2px 6px rgba(0,0,0,0.4);
}
.city-marker-wrap:hover .city-pin-tip { border-top-color: #ff7a12; }

.city-marker-wrap.active .city-pin-btn {
  background: var(--accent);
  border-color: rgba(255,255,255,0.4);
  box-shadow: 0 4px 18px rgba(14,165,233,0.7), 0 1px 4px rgba(0,0,0,0.4);
}
.city-marker-wrap.active .city-pin-tip { border-top-color: var(--accent); }

/* ══════════════════════════════════════════
   ANALYSIS POPUP — appears near button
   ══════════════════════════════════════════ */
#analysis-popup {
  position: fixed;
  z-index: 2000;
  width: 480px;
  max-height: calc(100vh - 80px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 12px 60px rgba(0,0,0,0.75), 0 0 0 1px rgba(56,189,248,0.1);
  overflow: hidden;
  display: none;
  flex-direction: column;
  /* transform origin set by JS */
}
#analysis-popup.visible { display: flex; animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}
#analysis-popup.closing { animation: popOut 0.18s ease-in forwards; }
@keyframes popOut {
  to { opacity: 0; transform: scale(0.9); }
}

.popup-scroll {
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  flex: 1;
}
.popup-scroll::-webkit-scrollbar { width: 4px; }
.popup-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Popup header bar with close btn */
.popup-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.popup-city-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.popup-coords { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
.popup-close-btn {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted);
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.15s; flex-shrink: 0;
}
.popup-close-btn:hover { color: #fff; border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.12); }

/* ── Satellite Frame ── */
.sat-frame {
  width: 100%; height: 200px; position: relative;
  background: #020408; overflow: hidden;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sat-frame img { width: 100%; height: 100%; object-fit: fill; display: block; }
.sat-frame-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(7,9,15,0.94) 0%, transparent 55%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 12px; pointer-events: none;
}
.sat-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.sat-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  padding: 3px 8px; border-radius: 4px;
  background: rgba(14,165,233,0.18); color: var(--accent2); border: 1px solid rgba(14,165,233,0.28);
}
.sat-badge.live { background: rgba(239,68,68,0.18); color: #f87171; border-color: rgba(239,68,68,0.3); animation: liveblink 2s infinite; }
@keyframes liveblink { 0%,100%{opacity:1} 50%{opacity:0.55} }
.sat-badge.warn { background: rgba(245,158,11,0.18); color: #fbbf24; border-color: rgba(245,158,11,0.3); }
.scan-line {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(to right, transparent, var(--accent), transparent);
  animation: scan 3s ease-in-out infinite;
}
@keyframes scan { 0%{top:0;opacity:1} 100%{top:100%;opacity:0} }
.corner { position: absolute; width: 14px; height: 14px; border-color: var(--accent2); border-style: solid; opacity: 0.65; }
.corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
.corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }
.analyzing-mask {
  position: absolute; inset: 0; background: rgba(7,9,15,0.94);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  font-family: var(--mono);
}
.loader-ring { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 12px; color: var(--accent2); letter-spacing: 1.5px; font-weight: 700; }
.loader-sub { font-size: 11px; color: var(--muted); max-width: 260px; text-align: center; line-height: 1.6; }

/* ── Panel Body ── */
.panel-body { padding: 18px 18px 10px; }

/* ── Risk Gauge ── */
.risk-gauge {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px; margin-bottom: 14px;
}
.risk-row { display: flex; align-items: center; gap: 16px; }
.risk-score-box { font-family: var(--mono); font-size: 54px; font-weight: 700; min-width: 84px; text-align: center; line-height: 1; }
.risk-info { flex: 1; }
.risk-label { font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.risk-desc { font-size: 13px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
.risk-bar-bg { height: 7px; background: var(--border); border-radius: 4px; margin-top: 12px; overflow: hidden; }
.risk-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }
.score-low  .risk-score-box, .score-low  .risk-label { color: var(--safe); }
.score-mod  .risk-score-box, .score-mod  .risk-label { color: var(--warn); }
.score-high .risk-score-box, .score-high .risk-label { color: #fb923c; }
.score-crit .risk-score-box, .score-crit .risk-label { color: var(--danger); }
.score-low  .risk-bar-fill { background: var(--safe); }
.score-mod  .risk-bar-fill { background: var(--warn); }
.score-high .risk-bar-fill { background: #fb923c; }
.score-crit .risk-bar-fill { background: var(--danger); }

/* ── AI Box ── */
.ai-box { border: 1px solid rgba(14,165,233,0.28); border-radius: 12px; background: rgba(14,165,233,0.04); margin-bottom: 14px; overflow: hidden; }
.ai-box-header {
  background: rgba(14,165,233,0.1); padding: 11px 14px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--accent2); font-family: var(--mono);
}
.ai-chip { background: var(--accent); color: #000; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: auto; }
.ai-content { padding: 14px 16px; }
.flood-verdict { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.flood-verdict.detected { color: var(--danger); }
.flood-verdict.clear { color: var(--safe); }
.confidence-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.conf-label { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
.conf-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 4px; }
.conf-val { font-family: var(--mono); font-size: 13px; font-weight: 700; white-space: nowrap; min-width: 38px; text-align: right; }
.water-pct-display {
  background: linear-gradient(135deg, #0b2540 0%, #091b30 100%);
  border: 1px solid rgba(56,189,248,0.18); border-radius: 10px;
  padding: 12px; text-align: center; margin-bottom: 12px;
}
.water-big { font-family: var(--mono); font-size: 44px; font-weight: 700; color: var(--accent2); }
.water-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }
.ai-analysis-text { font-size: 13px; color: #94a3b8; line-height: 1.75; }
.model-tag { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 10px; line-height: 1.65; }

/* ── Section Titles ── */
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 10px; margin-top: 18px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── Weather Grid ── */
.weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.w-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.w-val { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
.w-unit { font-size: 12px; color: var(--muted); font-weight: 400; }
.w-key { font-size: 12px; color: var(--muted); margin-top: 5px; }

/* ── Rain Chart ── */
.rain-chart { margin-bottom: 14px; }
.rain-bars { display: flex; gap: 3px; align-items: flex-end; height: 60px; margin-top: 8px; }
.rain-bar { flex: 1; background: rgba(14,165,233,0.3); border-radius: 2px 2px 0 0; min-height: 3px; transition: background 0.2s; }
.rain-bar:hover { background: rgba(14,165,233,0.65); }
.rain-bar.today { background: rgba(56,189,248,0.88); }
.rain-bar.forecast { background: rgba(245,158,11,0.38); }
.rain-bar.forecast:hover { background: rgba(245,158,11,0.65); }
.rain-labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
.rain-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.rain-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px; }
.rain-stat-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent2); }
.rain-stat-key { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── Factors ── */
.factors-list { display: flex; flex-direction: column; gap: 6px; }
.factor-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #94a3b8; line-height: 1.5; }
.factor-item.warn   { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.06); color: #fcd34d; }
.factor-item.danger { border-color: rgba(239,68,68,0.35);  background: rgba(239,68,68,0.06);  color: #f87171; }

/* ── Rec Box ── */
.rec-box { background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.25); border-radius: 12px; padding: 16px 18px; margin-top: 16px; }
.rec-box.high-risk     { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.3); }
.rec-box.critical-risk { background: rgba(239,68,68,0.06);  border-color: rgba(239,68,68,0.35); }
.rec-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
.rec-text  { font-size: 14px; line-height: 1.7; font-weight: 500; }

/* ── Footer ── */
.sources { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 18px; border-top: 1px solid var(--border); margin-top: 8px; }
.src-tag { font-family: var(--mono); font-size: 10px; padding: 4px 8px; border-radius: 5px; background: rgba(100,116,139,0.14); color: var(--muted); border: 1px solid var(--border); }
.timestamp-bar { padding: 0 18px 16px; font-family: var(--mono); font-size: 10px; color: var(--muted); }

/* Water vuln card */
.water-vuln-card {
  background: rgba(56,189,248,0.05); border: 1px solid rgba(56,189,248,0.2);
  border-radius: 12px; padding: 13px 15px; margin-bottom: 14px;
}
.water-vuln-header { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--accent2); font-weight: 700; margin-bottom: 8px; }
.water-vuln-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.water-vuln-pct { font-family: var(--mono); font-size: 30px; font-weight: 700; color: var(--accent2); }
.water-vuln-type { font-size: 13px; font-weight: 700; color: var(--text); }
.water-vuln-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.water-vuln-items { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.water-vuln-item { font-size: 11px; color: #fbbf24; font-family: var(--mono); }

/* ══════════════════════════════════════════
   AI SYNTHESIS POPUP — secondary panel
   ══════════════════════════════════════════ */
#conclusion-popup {
  position: fixed;
  z-index: 1999;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(56,189,248,0.08);
  overflow: hidden;
  display: none;
  flex-direction: column;
}
#conclusion-popup.visible { display: flex; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
#conclusion-popup.closing { animation: popOut 0.16s ease-in forwards; }

.cp-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cp-title { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent2); display: flex; align-items: center; gap: 7px; }
.cp-close {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 7px;
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); font-size: 13px; transition: all 0.15s; flex-shrink: 0;
}
.cp-close:hover { color: #fff; border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.12); }
.cp-body { padding: 14px 16px 16px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.cp-body::-webkit-scrollbar { width: 4px; }
.cp-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Timeline */
.cp-timeline { display: flex; flex-direction: column; gap: 0; margin: 2px 0 4px; }
.cp-tl-step { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; position: relative; }
.cp-tl-step:not(:last-child)::before {
  content: ''; position: absolute; left: 9px; top: 26px; bottom: -8px; width: 1px; background: var(--border);
}
.cp-tl-dot {
  width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted);
  background: var(--surface2); transition: all 0.25s; margin-top: 1px; position: relative; z-index: 1;
}
.cp-tl-step.active .cp-tl-dot { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }
.cp-tl-step.active .cp-tl-dot::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
.cp-tl-step.done .cp-tl-dot { border-color: var(--safe); background: rgba(34,197,94,0.15); }
.cp-tl-step.done .cp-tl-dot::after { content: '✓'; color: var(--safe); font-size: 11px; }
.cp-tl-label { font-size: 12.5px; color: var(--muted); padding-top: 2px; transition: color 0.25s; line-height: 1.4; }
.cp-tl-step.active .cp-tl-label { color: var(--text); font-weight: 600; }
.cp-tl-step.done .cp-tl-label { color: #94a3b8; }

/* Conclusion result */
.cp-trend-row {
  display: flex; align-items: center; gap: 10px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
}
.cp-trend-score { font-family: var(--mono); font-weight: 700; font-size: 20px; line-height: 1; }
.cp-trend-arrow { font-size: 16px; font-weight: 700; }
.cp-trend-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }
.cp-conclusion-text { font-size: 13px; line-height: 1.7; color: #cbd5e1; margin-bottom: 14px; }
.cp-mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.cp-mini-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; }
.cp-mini-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; word-break: break-word; }
.cp-mini-key { font-size: 10px; color: var(--muted); margin-top: 3px; }
.cp-model-tag { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

function positionPopup(clickEvent) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const PW = 480;
  const maxH = H - 80;

  let x, y;

  if (clickEvent) {
    const cx = clickEvent.clientX || clickEvent.pageX || W / 2;
    const cy = clickEvent.clientY || clickEvent.pageY || H / 2;
    // Place to the right of click if space, otherwise left
    x = cx + 20;
    if (x + PW > W - 16) x = cx - PW - 20;
    x = Math.max(16, x);

    // Place below click if space, otherwise above
    y = cy - 60;
    if (y + maxH > H - 16) y = H - maxH - 16;
    y = Math.max(60, y);
  } else {
    x = W / 2 - PW / 2;
    y = 80;
  }

  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  popup.style.width = PW + 'px';
  popup.style.maxHeight = maxH + 'px';
}

// Recomputes the same risk model against forecast rainfall instead of past rainfall,
// so we get a genuine "if the forecast materializes" projection rather than a guess.
function computeForecastRisk(wx, lat, lon, name, ai) {
  const boost = Math.min(wx.next7 / 300, 0.22);
  const projectedWx = {
    ...wx,
    past1: wx.next7 / 7,
    past3: wx.next7 * (3 / 7),
    past7: wx.next7,
    soilSaturation: Math.min(wx.soilSaturation + boost, 1),
    consecutiveRainDays: wx.next7 > 40 ? Math.min(wx.consecutiveRainDays + 2, 7) : wx.consecutiveRainDays
  };
  return computeRisk(ai, projectedWx, lat, lon, name);
}

async function runClaudeSynthesis(dp, risk, forecastRisk) {
  const systemPrompt = `You are a senior hydrology and flood-risk analyst. You write short, precise, plain-English executive conclusions for decision-makers based only on the data provided. Respond ONLY with a valid JSON object, no markdown, no preamble.`;
  const userPrompt = `City: ${dp.name}
Current computed risk score: ${risk.score}/100 (${risk.level})
Forecast-adjusted risk score (if the next 7-day rainfall forecast materializes): ${forecastRisk.score}/100 (${forecastRisk.level})
Satellite/AI verdict: ${dp.floodDetected ? 'Flood signal detected' : 'No active flooding detected'} (confidence ${dp.confidence}%)
Estimated water coverage: ${dp.waterBodyPct}%
Soil saturation: ${dp.soilSaturationPct}% of field capacity
Rainfall — past 7 days: ${dp.past7}mm, forecast next 7 days: ${dp.next7}mm
Consecutive rainy days: ${dp.consecutiveRainDays}
Satellite image quality: ${dp.imageQuality}

Respond with this exact JSON:
{
  "conclusion": "3-4 sentence plain-English executive conclusion synthesizing the satellite finding, current conditions, and forecast trend, ending with a clear takeaway",
  "trend": "rising" | "falling" | "stable",
  "keyDriver": "short phrase naming the dominant risk driver, e.g. soil saturation, forecast rainfall, or river geography"
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, system: systemPrompt, messages: [{ role: "user", content: userPrompt }] })
    });
    if (!response.ok) throw new Error(`Claude API: ${response.status}`);
    const data = await response.json();
    let clean = (data.content?.[0]?.text || '{}').trim();
    if (clean.startsWith('```')) clean = clean.replace(/```json?/g, '').replace(/```/g, '').trim();
    const parsed = JSON.parse(clean);
    parsed._source = 'claude-synthesis';
    return parsed;
  } catch (e) {
    console.error('Synthesis API error:', e);
    return synthesisFallback(dp, risk, forecastRisk);
  }
}

// Deterministic fallback if the Claude call fails — still built entirely from the real numbers, not filler text.
function synthesisFallback(dp, risk, forecastRisk) {
  const delta = forecastRisk.score - risk.score;
  const trend = delta >= 8 ? 'rising' : delta <= -8 ? 'falling' : 'stable';
  const keyDriver = dp.soilSaturationPct >= 70 ? 'soil saturation' : dp.next7 >= 100 ? 'forecast rainfall' : 'baseline geography';
  const verdictText = dp.floodDetected ? `active flood signals are present with ${dp.confidence}% confidence` : `no active flooding is currently detected`;
  const trendText = trend === 'rising'
    ? `conditions are expected to worsen, with risk projected to climb to ${forecastRisk.score}/100 (${forecastRisk.level}) if the forecast ${dp.next7}mm of rain over the next 7 days materializes`
    : trend === 'falling'
      ? `risk is expected to ease slightly over the coming week`
      : `risk is expected to remain broadly stable over the coming week`;
  const conclusion = `${dp.name} currently sits at ${risk.score}/100 (${risk.level} risk), and ${verdictText}. Soil saturation is at ${dp.soilSaturationPct}% of field capacity following ${dp.consecutiveRainDays} consecutive rainy days, which is the dominant factor behind the current score. Looking ahead, ${trendText}. Continued monitoring of rainfall and soil conditions is recommended given ${keyDriver} as the primary driver.`;
  return { conclusion, trend, keyDriver, _source: 'weather-data-synthesis' };
}

      </div>

      <div class="cp-model-tag">MODEL: claude-sonnet-4-20250514 · ${synthesis._source}</div>
    </div>`;

// Runs a short while after the main satellite panel finishes, in its own popup, with a real

async function runConclusionAnalysis(name, lat, lon, ai, wx, risk) {
  const runId = ++conclusionRunId;
  conclusionPopupContent.innerHTML = buildConclusionLoadingHTML(name);
  openConclusionPopup();

  await sleep(250);
  if (runId !== conclusionRunId) return;
  setStepState(1, 'active');
  const dp = buildSynthesisDataPackage(name, ai, wx);
  await sleep(350);
  if (runId !== conclusionRunId) return;
  setStepState(1, 'done');

  setStepState(2, 'active');
  const forecastRisk = computeForecastRisk(wx, lat, lon, name, ai);
  await sleep(350);
  if (runId !== conclusionRunId) return;
  setStepState(2, 'done');

  setStepState(3, 'active');
  const synthesis = await runClaudeSynthesis(dp, risk, forecastRisk);

  await sleep(200);
  if (runId !== conclusionRunId) return;

  await sleep(150);
  if (runId !== conclusionRunId) return;

    updateStep('Computing comprehensive risk score...');

function buildSatImageUrl(lat, lon, date) {
  const delta = 0.8;
  const minLon = (lon - delta).toFixed(6), minLat = (lat - delta).toFixed(6);
  const maxLon = (lon + delta).toFixed(6), maxLat = (lat + delta).toFixed(6);
  return `https://gibs.earthdata.nasa.gov/wms/epsg4326/best/wms.cgi?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=MODIS_Terra_CorrectedReflectance_TrueColor&SRS=EPSG:4326&BBOX=${minLon},${minLat},${maxLon},${maxLat}&WIDTH=560&HEIGHT=200&FORMAT=image/jpeg&TIME=${date}&TRANSPARENT=false`;
}

function buildWorldviewUrl(lat, lon, date) {
  const delta = 1.5;
  const minLon = (lon - delta).toFixed(4), minLat = (lat - delta).toFixed(4);
  const maxLon = (lon + delta).toFixed(4), maxLat = (lat + delta).toFixed(4);
  return `https://worldview.earthdata.nasa.gov/?v=${minLon},${minLat},${maxLon},${maxLat}&l=MODIS_Terra_CorrectedReflectance_TrueColor&t=${date}`;
}

async function fetchSatImageAsBase64(lat, lon, date) {
  const imgUrl = buildSatImageUrl(lat, lon, date);
  try {
    const response = await fetch(imgUrl);
    if (!response.ok) throw new Error(`NASA GIBS returned ${response.status}`);
    const blob = await response.blob();
    const mimeType = blob.type || 'image/jpeg';
    const base64 = await blobToBase64(blob);
    return { base64, imgUrl, mimeType };
  } catch (e) {
    console.warn('Direct NASA fetch failed:', e);
    return { base64: null, imgUrl, mimeType: 'image/jpeg' };
  }
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,relative_humidity_2m,precipitation,rain,weather_code,cloud_cover,wind_speed_10m,surface_pressure,dew_point_2m` +
    `&hourly=precipitation,soil_moisture_0_to_1cm,soil_moisture_1_to_3cm,soil_moisture_3_to_9cm` +
    `&daily=precipitation_sum,precipitation_hours,precipitation_probability_max,weather_code,temperature_2m_max,temperature_2m_min,rain_sum,et0_fao_evapotranspiration,wind_speed_10m_max` +
    `&timezone=Asia/Kolkata&past_days=14&forecast_days=7`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Open-Meteo error: ${r.status}`);
  const data = await r.json();
  const cur = data.current;
  const daily = data.daily;
  const hourly = data.hourly;
  const precip = daily.precipitation_sum || [];
  const past1  = precip.slice(13,14).reduce((a,b)=>a+(b||0),0);
  const past3  = precip.slice(11,14).reduce((a,b)=>a+(b||0),0);
  const past7  = precip.slice(7,14).reduce((a,b)=>a+(b||0),0);
  const past14 = precip.slice(0,14).reduce((a,b)=>a+(b||0),0);
  const next7  = precip.slice(14).reduce((a,b)=>a+(b||0),0);
  const sm0 = hourly.soil_moisture_0_to_1cm || [];
  const sm1 = hourly.soil_moisture_1_to_3cm || [];
  const sm3 = hourly.soil_moisture_3_to_9cm || [];
  const recentIdx = Math.max(0, sm0.length - 48);
  const avgSM = (arr) => { const vals = arr.slice(recentIdx).filter(v=>v!=null); return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null; };
  const soilMoisture0 = avgSM(sm0), soilMoisture1 = avgSM(sm1), soilMoisture3 = avgSM(sm3);
  const etValues = (daily.et0_fao_evapotranspiration||[]).slice(7,14).filter(v=>v!=null);
  const avgET = etValues.length ? etValues.reduce((a,b)=>a+b,0)/etValues.length : 3;
  const maxDailyRain = Math.max(...precip.slice(0,14).map(v=>v||0));
  let consecutiveRainDays = 0;
  for (let i=13; i>=7; i--) { if((precip[i]||0) > 1) consecutiveRainDays++; else break; }
  const soilSaturation = computeSoilSaturation(soilMoisture0, soilMoisture1, soilMoisture3, past7, avgET);
  return {
    temp: cur.temperature_2m, humidity: cur.relative_humidity_2m,
    currentRain: cur.precipitation||0, rain: cur.rain||0,
    cloudCover: cur.cloud_cover, windSpeed: cur.wind_speed_10m,
    pressure: cur.surface_pressure, dewPoint: cur.dew_point_2m,
    weatherCode: cur.weather_code, past1, past3, past7, past14, next7,
    maxDailyRain, consecutiveRainDays,
    soilMoisture0, soilMoisture1, soilMoisture3, soilSaturation, avgET,
    maxProbNext7: Math.max(...(daily.precipitation_probability_max||[]).slice(14), 0),
    daily: { dates: daily.time, precip: daily.precipitation_sum || [] }
  };
}

function computeSoilSaturation(sm0, sm1, sm3, rain7, et) {
  let score = 0, count = 0;
  if (sm0 != null) { score += Math.min(sm0/0.45, 1); count++; }
  if (sm1 != null) { score += Math.min(sm1/0.42, 1); count++; }
  if (sm3 != null) { score += Math.min(sm3/0.40, 1); count++; }
  if (count === 0) { return Math.min((rain7 / Math.max(et*7,1)) / 4, 1); }
  const smScore = score / count;
  const rainBoost = Math.min(rain7 / (Math.max(et,1) * 7 * 2), 0.3);
  return Math.min(smScore + rainBoost, 1);
}

async function runClaudeVisionAnalysis(base64, mimeType, lat, lon, cityName, wx) {
  const month = new Date().toLocaleString('en', { month: 'long' });
  const isMonsoon = [6,7,8,9].includes(new Date().getMonth()+1);
  const systemPrompt = `You are an expert remote sensing scientist and flood risk analyst specializing in South Asia. 
You analyze MODIS Terra true-color satellite imagery to detect water bodies, flooding, and flood risk indicators.
Respond ONLY with a valid JSON object, no markdown, no preamble.`;
  const userPrompt = `Analyze this NASA MODIS Terra true-color satellite image of ${cityName}, India (lat: ${lat.toFixed(4)}, lon: ${lon.toFixed(4)}).
Current weather context: ${wx.past7.toFixed(1)}mm rain past 7 days, ${wx.currentRain.toFixed(1)}mm/h now, ${wx.humidity}% humidity, ${isMonsoon ? 'MONSOON SEASON' : 'non-monsoon'}.
Examine the image carefully for: water body coverage, unusual water extent, cloud cover, urban flood indicators, agricultural inundation, river overflow.
Respond with this exact JSON:
{
  "floodDetected": boolean,
  "confidence": number (0-100),
  "waterBodyPct": number (0-100),
  "cloudCoverPct": number (0-100),
  "imageQuality": "good"|"partial"|"obscured",
  "observations": [3-5 specific visual observations],
  "floodIndicators": [specific flood indicators or []],
  "analysisNotes": "2-3 sentence summary",
  "limitations": "any limitations"
}`;
  const messages = [];
  if (base64) {
    messages.push({ role:"user", content:[{ type:"image", source:{type:"base64", media_type:mimeType, data:base64} }, {type:"text", text:userPrompt}] });
  } else {
    messages.push({ role:"user", content: userPrompt + "\n\nNote: Satellite image unavailable. Set imageQuality to 'unavailable'." });
  }
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:systemPrompt, messages })
    });
    if (!response.ok) throw new Error(`Claude API: ${response.status}`);
    const data = await response.json();
    let clean = (data.content?.[0]?.text||'{}').trim();
    if (clean.startsWith('```')) clean = clean.replace(/```json?/g,'').replace(/```/g,'').trim();
    const parsed = JSON.parse(clean);
    parsed._source = base64 ? 'claude-vision-satellite' : 'claude-text-context';
    return parsed;
  } catch(e) {
    console.error('Claude API error:', e);
    return geographicFallback(lat, lon, cityName, wx);
  }
}

function geographicFallback(lat, lon, cityName, wx) {
  const baseWaterPct = getBaseWaterPct(cityName, lat, lon);
  let dynamicWater = 0;
  if (wx.past1 > 50) dynamicWater += 15; else if (wx.past1 > 25) dynamicWater += 8; else if (wx.past1 > 10) dynamicWater += 3;
  if (wx.past3 > 100) dynamicWater += 12; else if (wx.past3 > 50) dynamicWater += 6;
  if (wx.past7 > 200) dynamicWater += 10; else if (wx.past7 > 100) dynamicWater += 5;
  if (wx.soilSaturation > 0.85) dynamicWater *= 2.2; else if (wx.soilSaturation > 0.7) dynamicWater *= 1.6; else if (wx.soilSaturation > 0.5) dynamicWater *= 1.2;
  if (wx.currentRain > 10) dynamicWater += 5;
  dynamicWater += wx.consecutiveRainDays * 1.5;
  const totalWater = baseWaterPct + dynamicWater;
  const waterBodyPct = Math.min(Math.max(totalWater, baseWaterPct), 85);
  const floodDetected = dynamicWater > 8;
  const confidence = 62 + Math.min(wx.past7/5, 20);
  const isMonsoon = [6,7,8,9].includes(new Date().getMonth()+1);
  const waterInfo = getCityWaterInfo(cityName, lat, lon);
  const obs = [
    `Baseline water bodies: ${baseWaterPct.toFixed(1)}% — ${waterInfo.description}`,
    `Flood inundation estimate: +${dynamicWater.toFixed(1)}% above baseline`,
    `Soil saturation: ${(wx.soilSaturation*100).toFixed(0)}% of field capacity`,
    `Consecutive rainy days: ${wx.consecutiveRainDays}`,
    `Season: ${isMonsoon?'Active monsoon':'Non-monsoon'}`
  ];
  return {
    floodDetected, confidence: Math.round(confidence),
    waterBodyPct: +waterBodyPct.toFixed(1),
    cloudCoverPct: Math.round(wx.cloudCover || 40),
    imageQuality: 'unavailable', observations: obs,
    floodIndicators: floodDetected ? [
      `+${dynamicWater.toFixed(1)}% flood water above normal baseline`,
      wx.soilSaturation > 0.7 ? `Soil at ${(wx.soilSaturation*100).toFixed(0)}% saturation — runoff risk high` : null,
      wx.consecutiveRainDays >= 3 ? `${wx.consecutiveRainDays} consecutive days of rain` : null
    ].filter(Boolean) : [],
    analysisNotes: `Weather-driven analysis for ${cityName}: ${wx.past7.toFixed(0)}mm over 7 days, soil saturation ${(wx.soilSaturation*100).toFixed(0)}%. ${floodDetected?'Significant flood indicators present.':'No significant flood indicators.'}`,
    limitations: 'Satellite image not directly analyzed — estimates from meteorological & geographic data.',
    _source: 'weather-data-model'
  };
}

}

function getBaseWaterPct(cityName, lat, lon) {
  return getCityWaterInfo(cityName, lat, lon).base;
}

function computeRisk(ai, wx, lat, lon, name) {
  const factors = []; const warnings = []; let breakdown = {};
  let soilScore = 0;
  const satPct = Math.round(wx.soilSaturation * 100);
  if (wx.soilSaturation >= 0.90)      { soilScore=25; factors.push({text:`🌱 SOIL COMPLETELY SATURATED: ${satPct}%`,type:'danger'}); warnings.push('Ground fully saturated — flash flood imminent'); }
  else if (wx.soilSaturation >= 0.75) { soilScore=18; factors.push({text:`🌱 High soil saturation: ${satPct}%`,type:'warn'}); }
  else if (wx.soilSaturation >= 0.55) { soilScore=10; factors.push({text:`🌱 Moderate soil saturation: ${satPct}%`,type:'warn'}); }
  else if (wx.soilSaturation >= 0.35) { soilScore=4;  factors.push({text:`🌱 Soil partially moist: ${satPct}%`,type:'normal'}); }
  else                                 { soilScore=0;  factors.push({text:`🌱 Dry soil: ${satPct}%`,type:'normal'}); }
  breakdown.soil = soilScore;
  let rainScore = 0;
  if (wx.past1 >= 204)     { rainScore+=15; factors.push({text:`☔ EXTREME: ${wx.past1.toFixed(0)}mm yesterday`,type:'danger'}); warnings.push('Extremely heavy rain — flash flood conditions'); }
  else if (wx.past1 >= 115){ rainScore+=11; factors.push({text:`🌧 Very heavy: ${wx.past1.toFixed(0)}mm yesterday`,type:'danger'}); }
  else if (wx.past1 >= 64) { rainScore+=7;  factors.push({text:`🌧 Heavy: ${wx.past1.toFixed(0)}mm yesterday`,type:'warn'}); }
  else if (wx.past1 >= 15) { rainScore+=3;  factors.push({text:`🌦 Moderate: ${wx.past1.toFixed(0)}mm yesterday`,type:'normal'}); }
  else                      {               factors.push({text:`☁ Minimal rain yesterday: ${wx.past1.toFixed(0)}mm`,type:'normal'}); }
  if (wx.past3 >= 150)     { rainScore+=10; factors.push({text:`📊 3-day: ${wx.past3.toFixed(0)}mm — critical`,type:'danger'}); }
  else if (wx.past3 >= 75) { rainScore+=6;  factors.push({text:`📊 3-day: ${wx.past3.toFixed(0)}mm`,type:'warn'}); }
  else if (wx.past3 >= 30) { rainScore+=3;  factors.push({text:`📊 3-day: ${wx.past3.toFixed(0)}mm`,type:'normal'}); }
  breakdown.rain = rainScore;
  let antScore = 0;
  if (wx.past7 >= 300)     { antScore=15; factors.push({text:`📅 7-day: ${wx.past7.toFixed(0)}mm — extreme antecedent`,type:'danger'}); }
  else if (wx.past7 >= 150){ antScore=10; factors.push({text:`📅 7-day: ${wx.past7.toFixed(0)}mm — high`,type:'warn'}); }
  else if (wx.past7 >= 75) { antScore=6;  factors.push({text:`📅 7-day: ${wx.past7.toFixed(0)}mm`,type:'normal'}); }
  else if (wx.past7 >= 20) { antScore=2;  factors.push({text:`📅 7-day: ${wx.past7.toFixed(0)}mm`,type:'normal'}); }
  if (wx.consecutiveRainDays >= 5)      { antScore=Math.min(antScore+5,15); factors.push({text:`🔁 ${wx.consecutiveRainDays} consecutive rain days`,type:'warn'}); }
  else if (wx.consecutiveRainDays >= 3) { antScore=Math.min(antScore+2,15); factors.push({text:`🔁 ${wx.consecutiveRainDays} consecutive rain days`,type:'normal'}); }
  breakdown.antecedent = antScore;
  let curScore = 0;
  if (wx.currentRain >= 15)   { curScore+=10; factors.push({text:`⚡ ACTIVE HEAVY RAIN: ${wx.currentRain.toFixed(1)}mm/h`,type:'danger'}); warnings.push(`Active ${wx.currentRain.toFixed(1)}mm/h rain`); }
  else if (wx.currentRain >= 5){ curScore+=6; factors.push({text:`🌧 Active rain: ${wx.currentRain.toFixed(1)}mm/h`,type:'warn'}); }
  else if (wx.currentRain > 0) { curScore+=2; factors.push({text:`🌦 Light rain: ${wx.currentRain.toFixed(1)}mm/h`,type:'normal'}); }
  if (wx.humidity >= 95)      { curScore+=5; factors.push({text:`💧 Near-saturated atmosphere: ${wx.humidity}%`,type:'warn'}); }
  else if (wx.humidity >= 85) { curScore+=2; factors.push({text:`💧 High humidity: ${wx.humidity}%`,type:'normal'}); }
  if (wx.pressure && wx.pressure < 1000) { curScore+=Math.min(Math.round((1000-wx.pressure)*0.8),5); factors.push({text:`🌀 Low pressure: ${wx.pressure?.toFixed(0)}hPa`,type:'warn'}); }
  breakdown.current = curScore;
  let fcastScore = 0;
  if (wx.next7 >= 200)     { fcastScore=10; factors.push({text:`🔮 Forecast: ${wx.next7.toFixed(0)}mm next 7d — dangerous`,type:'danger'}); warnings.push(`Heavy rain forecast: ${wx.next7.toFixed(0)}mm`); }
  else if (wx.next7 >= 100){ fcastScore=6;  factors.push({text:`🔮 Forecast: ${wx.next7.toFixed(0)}mm next 7d`,type:'warn'}); }
  else if (wx.next7 >= 40) { fcastScore=3;  factors.push({text:`🔮 Forecast: ${wx.next7.toFixed(0)}mm next 7d`,type:'normal'}); }
  if (wx.maxProbNext7 >= 80){ fcastScore=Math.min(fcastScore+3,10); factors.push({text:`📡 ${wx.maxProbNext7}% peak rain probability next week`,type:'warn'}); }
  breakdown.forecast = fcastScore;
  const waterInfo = getCityWaterInfo(name, lat, lon);
  const geoScore = getGeoVulnerabilityScore(name, lat, lon, waterInfo);
  factors.push(...geoScore.factors);
  breakdown.geography = geoScore.score;
  let rawScore = soilScore + rainScore + antScore + curScore + fcastScore + geoScore.score;
  if (soilScore >= 18 && rainScore >= 11) { rawScore *= 1.3; }
  if (soilScore >= 10 && wx.consecutiveRainDays >= 4 && antScore >= 6) { rawScore *= 1.15; }
  const finalScore = Math.min(Math.round(rawScore), 100);
  let level, rec, recClass;
  if (finalScore >= 80)      { level='CRITICAL'; rec='🚨 EVACUATE NOW if in low-lying areas. Do not cross flooded roads. Call 1078 or 112.'; recClass='critical-risk'; }
  else if (finalScore >= 60) { level='HIGH';     rec='⚠ Prepare emergency supplies. Move valuables to upper floors. Monitor NDMA/IMD alerts.'; recClass='high-risk'; }
  else if (finalScore >= 35) { level='MODERATE'; rec='⚡ Stay alert. Avoid flood-prone areas. Keep emergency kit ready.'; recClass=''; }
  else if (finalScore >= 15) { level='LOW';      rec='✓ Low flood probability. Monitor weather if rain forecast.'; recClass=''; }
  else                        { level='MINIMAL'; rec='✓ Very low risk. Normal conditions.'; recClass=''; }
  return { score: finalScore, level, factors, warnings, rec, recClass, breakdown, waterInfo };
}

function getGeoVulnerabilityScore(name, lat, lon, waterInfo) {
  let score = 0; const factors = [];
  const highRiskTypes = ['River Delta','Brahmaputra','Confluence','Coastal Backwater','Valley Lake','Atoll','Estuary'];
  const modRiskTypes  = ['Coastal','River Valley','Floodplain','Terai','Kerala'];
  if (highRiskTypes.some(t => waterInfo.type.includes(t))) { score += 7; }
  else if (modRiskTypes.some(t => waterInfo.type.includes(t))) { score += 4; }
  else { score += 2; }
  if (waterInfo.base >= 15) score = Math.min(score + 3, 10);
  if (lon > 89 && lat > 22) score = Math.min(score + 2, 10);
  if (waterInfo.vulnerabilities && waterInfo.vulnerabilities.length) {
    factors.push({ text: `🏞 ${waterInfo.type}: ${waterInfo.description}`, type: waterInfo.vulnerabilities.length >= 3 ? 'warn' : 'normal' });
    waterInfo.vulnerabilities.slice(0,3).forEach(v => factors.push({ text: `  ↳ ${v}`, type: 'normal' }));
  }
  return { score: Math.min(score, 10), factors };
}

function animateRiskBar(score) {
  setTimeout(() => { const bar = document.getElementById('risk-bar'); if (bar) bar.style.width = score + '%'; }, 100);
}

function getDateStr(offset=0) {
  const d = new Date(); d.setDate(d.getDate()+offset);
  return d.toISOString().slice(0,10);
}

function buildBreakdownBar(label, score, maxScore) {
  const pct = maxScore > 0 ? Math.round((score/maxScore)*100) : 0;
  const color = pct>=75?'#ef4444':pct>=50?'#fb923c':pct>=25?'#f59e0b':'#22c55e';
  return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
    <div style="font-size:10px;color:var(--muted);width:140px;flex-shrink:0;">${label}</div>
    <div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width 0.6s;"></div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:${color};width:38px;text-align:right;">${score}/${maxScore}</div>
  </div>`;
}

function getRiskDesc(score) {
  if (score < 35) return 'Low flood probability';
  if (score < 60) return 'Moderate risk level';
  if (score < 80) return 'High flood risk';
  return 'CRITICAL — Immediate danger';
}

function dotId(name) { return 'dot-'+name.replace(/[^a-zA-Z0-9]/g,'_'); }
function esc(s) { return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
